name: Deploy to Staging EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.5.1
        with:
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Staging EC2
        run: |
          scp -o StrictHostKeyChecking=no -i /home/ubuntu/.ssh/id_rsa index.html ubuntu@${{ secrets.EC2_IP_STAGING }}:/var/www/html/index.html
          ssh -o StrictHostKeyChecking=no -i /home/ubuntu/.ssh/id_rsa ubuntu@${{ secrets.EC2_IP_STAGING }} "sudo systemctl restart nginx"
